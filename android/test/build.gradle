plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    id 'kotlin-kapt'
}

android {
    namespace 'com.mozhimen.kotlin.utilk.android.test'
    compileSdk 35

    defaultConfig {
        applicationId "com.mozhimen.kotlin.utilk.android.test"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    kotlinOptions {
        jvmTarget = '1.8'
    }
    buildFeatures{
        dataBinding true
        viewBinding true
    }
    lintOptions {
        checkReleaseBuilds false
        abortOnError false
    }
}

dependencies {
    implementation project(':ATaskKit:executor')
    implementation project(':APermissionKit_XXPermissions:permissionk_xxpermissions')
    implementation project(':APermissionKit:permissionk')
    implementation 'com.github.mozhimen.AXmlKit:recyclerk-quick:0.0.5'

    implementation 'com.github.mozhimen.ASwiftKit:uik-databinding:2.1.6'
    implementation 'com.github.mozhimen.ALibKit_Jetpack:navigation-common-bom:0.0.7'
    implementation 'com.github.mozhimen.ALibKit_Jetpack:navigation-fragment-bom:0.0.7'
    implementation 'com.github.mozhimen.ALibKit_Jetpack:navigation-ui-bom:0.0.7'

    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.2.1'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.6.1'
}